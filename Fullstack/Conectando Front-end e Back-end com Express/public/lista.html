<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/lista.css">
</head>
<body>
  <main class="dashboard-wrapper">
    <header class="dashboard-header">
      <h1 class="dashboard-title">
        <i class="bi bi-people"></i>
        Lista de Usuários
      </h1>
      <div class="stats-card-modern">
        <h3 class="stats-label">Usuários totais</h3>
        <p class="stats-number" id="totalUsuarios">0</p>
      </div>
<div class="header-actions">
        <button id="theme-toggle" class="btn btn--secondary me-2" title="Alternar tema">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <a href="/cadastro.html" class="btn btn--primary me-2" aria-label="Novo usuário">
          <i class="bi bi-plus-circle"></i> Novo
        </a>
        <button id="btnAtualizar" class="btn btn--secondary" aria-label="Atualizar lista">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
    </header>

    <section class="main-content">
      <div id="mensagem" class="alert text-center" role="alert" style="display: none;" aria-live="polite"></div>
      
      <div class="search-section" id="filtro-container">
        <i class="search-icon" id="filtro-icon" aria-hidden="true"></i>
        <input type="search" id="filtro" class="form-control" placeholder="🔍 Pesquisar ID, nome, idade ou email..." aria-label="Filtrar usuários">
      </div>

      <div class="users-table">
        <div class="table-container">
          <table class="table" role="table" aria-label="Lista de usuários">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Nome</th>
                <th scope="col">Idade</th>
                <th scope="col">Email</th>
                <th scope="col">Ações</th>
              </tr>
            </thead>
            <tbody id="lista" role="rowgroup">
              <!-- Conteúdo dinâmico -->
            </tbody>
          </table>
        </div>
      </div>

      <nav class="table-navigation" aria-label="Navegação">
        <a href="/" class="btn btn--secondary">
          <i class="bi bi-house"></i> Início
        </a>
      </nav>
    </section>

    <!-- Modal Exclusão -->
    <div class="modal fade" id="modalExcluir" tabindex="-1" aria-labelledby="modalExcluirLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title" id="modalExcluirLabel">
              <i class="bi bi-exclamation-triangle" aria-hidden="true"></i>
              Confirmar exclusão
            </h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <p>Tem certeza que deseja excluir o usuário <strong id="nomeExcluir"></strong>?</p>
            <p class="text-muted small">Esta ação não pode ser desfeita.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn--secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" id="btnConfirmarExclusao" class="btn btn--danger">Excluir</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/theme-toggle.js"></script>
  <script src="/js/lista.js"></script>

</body>
</html>
