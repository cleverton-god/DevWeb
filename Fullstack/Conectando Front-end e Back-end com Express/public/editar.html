<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/form.css">
</head>
<body>
  <main class="dashboard-wrapper">
    <header class="dashboard-header">
      <div>
        <a href="/lista.html" class="btn btn--secondary" aria-label="Lista de usuários">
          <i class="bi bi-arrow-left"></i> Lista
        </a>
      </div>
      <h1 class="dashboard-title">
        <i class="bi bi-pencil-square"></i>
        Editar Usuário
      </h1>
      <div></div>
    </header>

    <section class="form-section">
      <div id="mensagem" class="alert" role="alert" style="display: none;" aria-live="polite"></div>
      
      <form id="formEditar" class="form-card" novalidate aria-labelledby="form-title">
        <input type="hidden" id="id" name="id">
        
        <div class="field-group">
          <label for="nome" class="field-label">Nome completo</label>
          <input type="text" class="form-control" id="nome" name="nome" required minlength="3" 
                 placeholder="João Silva" aria-describedby="nome-help">
          <div id="nome-help" class="help-text">Mínimo 3 caracteres</div>
        </div>

        <div class="field-group">
          <label for="idade" class="field-label">Idade</label>
          <input type="number" class="form-control" id="idade" name="idade" required min="0" max="120" 
                 placeholder="25" aria-describedby="idade-help">
          <div id="idade-help" class="help-text">Entre 0 e 120 anos</div>
        </div>

        <div class="field-group">
          <label for="email" class="field-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required 
                 placeholder="joao@email.com" aria-describedby="email-help">
          <div id="email-help" class="help-text">Formato válido necessário</div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn--warning">
            <i class="bi bi-check-lg"></i> Atualizar usuário
          </button>
          <a href="/lista.html" class="btn btn--secondary">Cancelar</a>
        </div>
      </form>
    </section>
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/theme-toggle.js"></script>
<script src="/js/editar.js"></script>
</body>
</html>
