<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estatísticas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>
  <main class="dashboard-wrapper">
    <header class="dashboard-header">
      <div>
        <a href="/lista.html" class="btn btn--secondary" aria-label="Lista de usuários">
          <i class="bi bi-arrow-left"></i> Usuários
        </a>
      </div>
      <h1 class="dashboard-title">
        <i class="bi bi-bar-chart-line"></i>
        Estatísticas
      </h1>
      <div class="header-actions">
        <button id="btnAtualizarStats" class="btn btn--secondary">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
    </header>

    <section class="stats-section">
      <div id="mensagem" class="alert" role="alert" style="display: none;" aria-live="polite"></div>
      
      <div class="stats-grid" id="container-estatisticas">
        <!-- Stats cards dinâmicos -->
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/estatisticas.js"></script>
</body>
</html>
