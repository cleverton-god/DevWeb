<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/index.css">



</head>
<body>
<main class="dashboard-wrapper">
    <header class="dashboard-header">
      <h1 class="dashboard-title">
        <i class="bi bi-people-fill"></i>
        Sistema de Usuários
      </h1>
      <div></div>
<div class="header-actions">
        <button id="theme-toggle" class="btn btn-secondary me-2" title="Alternar tema">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <a href="/lista.html" class="btn btn-primary">
          <i class="bi bi-list-ul"></i> Iniciar
        </a>
      </div>
    </header>

    <section class="hero-section">
      <div class="card">
        <div class="hero-content">
          <i class="bi bi-people" aria-hidden="true"></i>
          <h2 class="hero-title">Gerencie seus usuários facilmente</h2>
          <p class="hero-description">Sistema completo para cadastro, listagem, edição e estatísticas</p>
          <div class="hero-actions">
            <a href="/lista.html" class="btn btn-primary">
              <i class="bi bi-list-ul"></i> Ver usuários
            </a>
            <a href="/cadastro.html" class="btn btn-secondary">
              <i class="bi bi-plus-circle"></i> Novo usuário
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/theme-toggle.js"></script>
</body>
</html>
